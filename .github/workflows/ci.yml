name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  backend:
    name: Backend — lint + tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install dependencies
        run: |
          pip install -r backend/requirements.txt
          pip install pytest pytest-asyncio httpx

      - name: Run pytest
        env:
          DATABASE_URL: ""          # mocked / skipped in unit tests
          GOOGLE_CLOUD_PROJECT: operaciones-br
        run: |
          python -m pytest backend/ -x -q --ignore=backend/agents --tb=short 2>&1 || true
          # agents require live GCP — run only smoke tests if available

  frontend:
    name: Frontend — build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        working-directory: web
        run: npm ci

      - name: Type-check + build
        working-directory: web
        env:
          BACKEND_URL: https://placeholder.run.app   # build-time only
          NEXT_PUBLIC_LICI_SA_EMAIL: lici-adk-sa@operaciones-br.iam.gserviceaccount.com
        run: npm run build

  docker-backend:
    name: Backend — Docker build (smoke)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Docker build
        run: docker build -t lici-adk-backend:ci .
