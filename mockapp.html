              const ref = useRef(null);
              useEffect(() => {
                 if (ref.current && window.lucide) {
                    ref.current.innerHTML = '';
                    const i = document.createElement('i');
                    i.setAttribute('data-lucide', dashName);
                    ref.current.appendChild(i);
                    window.lucide.createIcons({ 
                       attrs: { width: size, height: size, class: className, ...(color ? { color } : {}) }, 
                       root: ref.current 
                    });
                 }

                          </div>

                      </div>
                    </Modal>
                  </div>
                )}

                {/* TAB: USERS */}
                {activeTab === 'users' && (
                  <div className="space-y-6 animate-fade-in">
                    <div className="flex justify-end mb-4">
                      <Button icon={Plus}>Convidar Usuário</Button>
                    </div>
                    <Card className="overflow-hidden">
                      <table className="w-full text-left border-collapse">
                        <thead className={cx("border-b", isDark ? "bg-white/[0.02] border-white/10" : "bg-slate-50 border-slate-200")}>
                          <tr>
                            <th className="p-4 text-xs font-semibold uppercase tracking-wider text-slate-500">Usuário</th>
                            <th className="p-4 text-xs font-semibold uppercase tracking-wider text-slate-500">Email</th>
                            <th className="p-4 text-xs font-semibold uppercase tracking-wider text-slate-500">Papel (Role)</th>

                          </tr>
                        </thead>
                        <tbody className={cx("divide-y", isDark ? "divide-white/5" : "divide-slate-100")}>
                          {USERS.map(u => (
                            <tr key={u.id} className={cx("transition-colors", isDark ? "hover:bg-white/[0.02]" : "hover:bg-slate-50")}>
                              <td className="p-4 flex items-center gap-3">
                                <Avatar user={u} size="md" />
                                <span className={cx("text-sm font-medium", isDark ? "text-white" : "text-slate-800")}>{u.name} {u.isAi && <Badge colorTheme="pink" className="ml-2 px-1.5">IA</Badge>}</span>

                        </tbody>
                      </table>
                    </Card>
                  </div>
                )}

                {/* TAB: SYSTEM HEALTH */}
                {activeTab === 'system' && (
                  <div className="animate-fade-in grid grid-cols-1 md:grid-cols-2 gap-6">

                    <div className="relative">

                {view === 'edital' && <EditalDetailView editalId={selectedEditalId} onBack={() => setView('pipeline')} />}
                {view === 'upload' && <UploadView onComplete={() => setView('edital')} onCancel={() => setView('pipeline')} />}
                {view === 'historico' && <HistoricoView />}
                {view === 'admin' && <AdminView />}
                {view === 'config' && <ConfigView />}

              {/* --- NOTIFICATIONS DRAWER --- */}
              <Drawer isOpen={notificationsOpen} onClose={() => setNotificationsOpen(false)} title="Notificações do Sistema">

                       <div className="flex justify-between items-start mb-1">

                 </div>
              </Drawer>
            </div>
          );
        };

        const XLiciApp = () => (
          <ThemeProvider>

          </ThemeProvider>

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<XLiciApp />);
