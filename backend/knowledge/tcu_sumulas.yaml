remedios_processuais:
  impugnacao_edital:
    base_legal: "Art. 164 da Lei 14.133/2021"
    prazo: "Até 3 dias úteis antes da data de abertura"
    legitimidade: "Qualquer pessoa"
    protocolo: "PNCP ou plataforma do órgão"

  pedido_esclarecimento:
    base_legal: "Art. 164 da Lei 14.133/2021"
    prazo: "Até 3 dias úteis antes da abertura"

  recurso_administrativo:
    base_legal: "Art. 165 da Lei 14.133/2021"
    prazo: "3 dias úteis da intimação; contrarrazões em 3 dias úteis"

  representacao_tcu:
    base_legal: "Arts. 235 e 237 do RI/TCU; Resolução TCU 315/2020"
    prazo: "Sem prazo formal — crucial antes da homologação para cautelar"
    custas: "Isento"
    medida_cautelar: "TCU pode suspender o certame"

  mandado_seguranca:
    base_legal: "Art. 5º, LXIX, CF/88 + Lei 12.016/2009"
    prazo_decadencial: "120 dias da ciência do ato"
    cabimento: "Direito líquido e certo; via residual"

  representacao_mp:
    orgaos: "MP de Contas, CGU, Ministério Público Federal/Estadual"
    tipificacao_penal: "Art. 337-F do CP; art. 155 da Lei 14.133/2021 (frustração do caráter competitivo)"
