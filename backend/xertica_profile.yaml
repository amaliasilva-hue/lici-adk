# Critérios de qualificação para participar de licitações
criterios_participacao:
  valor_minimo_contrato_brl: 50000  # referência — ajustar conforme política interna
  modalidades_aceitas:
    - "Pregão Eletrônico"
    - "Chamada Pública"
    - "Contratação Direta"
    - "Pré-qualificação"
    - "Dispensa de Licitação"
  restricoes:
    # IMPORTANTE: consorcio ≠ subcontratação.
    #   - Consórcio: Xertica NÃO participa como membro. Se o edital EXIGIR consórcio, é bloqueador.
    #   - Subcontratação: Xertica NÃO subcontrata terceiros para executar o objeto (ver
    #     qualificacao_empresa.posicionamento_em_consorcio.aceita_subcontratacao_para_terceiros=false).
    #     Xertica PODE ser subcontratada por outra integradora (pode_ser_subcontratada=true).
    - "Não participa de consórcios como membro"
    - "Não subcontrata terceiros para execução do objeto — entrega direta"
    - "Objeto deve estar alinhado ao portfólio: FDM, GIS, Google Cloud, GenAI ou Workspace"

