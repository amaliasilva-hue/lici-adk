# ══════════════════════════════════════════════════════════════════════
# NARRATIVA GTM — posicionamento comercial dos decks XerticaProducts/
# ATENÇÃO: "FDM", "Camada Ontológica", "Multi-agente" NÃO aparecem nominalmente
# em contratos reais. Use como argumento de venda/parecer quando o edital tocar
# em IA agêntica, triagem processual, análise de impacto etc — mas a entrega
# real é empacotada como GCP + Vertex AI + Gemini + serviços técnicos.
# ══════════════════════════════════════════════════════════════════════
narrativa_gtm:
  plataforma_fdm:
    nome: "FDM — Fair Decision Making"
    tipo: "narrativa de posicionamento (não é SKU vendável)"
    definicao: >
      Plataforma de IA Agêntica construída sobre arquitetura dual: Camada Ontológica
      (cérebro semântico que codifica leis, normas e jurisprudência em regras
      computacionais verificáveis) + Camada Agêntica (Sistema Multi-Agente com
      Chain of Thought executando tarefas complexas com autonomia auditável).
    diferenciais:
      - "Glass Box: 100% auditável, Explainable AI, log de justificativa por decisão"
      - "Ontologia jurídica nativa (MNI/TPU do CNJ, CONAMA, LGPD, e-PING)"
      - "Multi-agente especializado (Chain of Thought) em vez de LLM único"
      - "RAG com acervo curado da instituição — mitigação de alucinações"
      - "Motor de Regras Determinísticas + LLMs apenas para leitura (modelo híbrido)"
      - "Soberania de dados — deploy VPC/On-prem ou Cloud cliente"
      - "Semantic Data Accelerator — tradutor universal entre fontes (BACEN, COAF, Receita, CNJ, ANS)"
      - "Compliance & Audit Engine — rastro de auditoria para TCU/TCE"
      - "Arquitetura cloud-native containerizada (Kubernetes) com escalabilidade elástica"
    agentes_especializados:
      - "Analista Digital — triagem, classificação de competência, identificação de causas repetitivas"
      - "Assistente de Promotoria / Magistrado — pesquisa proativa de jurisprudência e fundamentos"
      - "Investigador Forense — cruzamento multimodal de dados (áudios, mensagens, planilhas, imagens)"
      - "Planejador Estratégico Digital — score de prioridade e alocação de recursos"
      - "Auditor Imutável — registro de decisões para conformidade"
    modulos:
      - "Case Understanding Module — OCR + NLP para extrair entidades (partes, crimes, valores)"
      - "Legal Precedent Analysis — jurisprudência e teses do acervo institucional"
      - "Case Context Module — score de prioridade por gravidade, vítimas, repercussão, prescrição"
      - "Compliance & Audit Engine — trilha de auditoria"
      - "Agentic Layer — orquestração multi-agente"
    kpis_tipicos:
      - "Redução de 40% no backlog / fila de entrada"
      - "Aumento de 150% na velocidade em casos repetitivos"
      - "Redução de 50% em casos prioritários próximos à prescrição"
      - "Redução de 30% em custos de litígio / recursos protelatórios"
      - "Aumento de 300% na análise de grandes volumes não estruturados"
      - "Aumento de 90% na identificação de vínculos suspeitos"
      - "Até 20% de recuperação de receita via cruzamento multimodal (Fisco)"
      - "95% de acurácia na classificação de competência"
      - "Zero exclusões por viés algorítmico"
    seguranca:
      - "Criptografia AES-256 em repouso e trânsito (TLS 1.2+)"
      - "RBAC — princípio do menor privilégio por agente"
      - "Zero Trust na interação entre agentes e sistemas legados"
      - "LGPD by design — anonimização e controle de acesso"
      - "Aderência LGPD, CNJ Resolução 332/2020, e-PING"

  # Plataforma GIS — também é narrativa/empacotamento sobre Google Maps + Earth Engine
  plataforma_gis:
    nome: "Xertica GIS"
    tipo: "narrativa de posicionamento (empacotamento sobre Google Maps / Earth Engine)"
    posicionamento: >
      Plataforma de inteligência geoespacial para tomada de decisão — não apenas
      visualização de mapas, mas cruzamento de variáveis para gerar insights
      acionáveis. Vai além de "CEP de maior risco" e "fluxo de pessoas".
    casos_de_uso:
      - "Setor Público / Fazenda — Mapa de Auditoria de Rotas (evasão fiscal em transporte de commodities)"
      - "Saúde Pública — Vigilância epidemiológica preventiva (Dengue, surtos, alocação de agentes)"
      - "Seguradoras — Mapa de Calor de Risco em micro-zonas (sinistralidade por enchente)"
      - "Varejo — Mapa de Potencial de Mercado (ponto de ouro com perfil + saturação de concorrência)"
    contratos_reais_relacionados:
      - "COPASA — Google Maps + APIs + GIS (R$ 201.783)"
      - "SEF-MG — Produto tecnológico geoespacial em nuvem"
      - "SEMAD/GO — MVP IA análise documental e geoespacial (Earth Engine)"

