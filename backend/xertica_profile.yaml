    google_partner_advantage: true
    google_public_sector_partner: true
  posicionamento_em_consorcio:
    participa_consorcio: false
    aceita_subcontratacao_para_terceiros: false
    pode_ser_subcontratada: true
  restricoes_operacionais:
    atua_em_todos_estados: true
    possui_filial_fisica: false
    trabalha_remoto_com_alocacao_presencial_ocasional: true

