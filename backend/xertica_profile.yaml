# QUALIFICAÇÃO DA EMPRESA — fatos para cruzar com requisitos de habilitação
# ══════════════════════════════════════════════════════════════════════
qualificacao_empresa:
  porte:
    enquadramento: "Grande porte"      # não ME/EPP — bloqueador em lotes exclusivos
